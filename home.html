<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言华教育 · 工具导航</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Roboto, sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #fff; }
        .app-layout { display: flex; height: 100vh; }

        .sidebar {
            width: 240px; min-width: 240px; height: 100vh;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border-right: 1px solid #eee;
            display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar-brand {
            padding: 26px 20px 22px;
            border-bottom: 1px solid #f0f0f0;
            background:
                radial-gradient(circle at 28px 28px, rgba(22,119,255,0.10), transparent 38px),
                linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.42));
        }
        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.34), rgba(255,255,255,0) 42%),
                linear-gradient(135deg, #5da8ff 0%, #1677FF 54%, #1158d8 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 12px 26px rgba(22,119,255,0.22), inset 0 1px 0 rgba(255,255,255,0.45);
            position: relative;
        }
        .brand-mark::after {
            content: '';
            position: absolute;
            inset: 7px;
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 8px;
        }
        .brand-text { min-width: 0; }
        .sidebar-brand .brand-name {
            max-width: 160px;
            font-size: 20px;
            line-height: 1.15;
            font-weight: 850;
            color: #1f3550;
            letter-spacing: 0.8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 1px 0 rgba(255,255,255,0.75);
        }
        .sidebar-brand .brand-sub {
            font-size: 10px;
            color: #7e8ea2;
            margin-top: 6px;
            letter-spacing: 1.8px;
            font-weight: 700;
        }
        .tool-list { flex: 1; padding: 12px 8px; }
        .tool-item {
            display: flex; align-items: center; padding: 11px 16px;
            margin-bottom: 2px; border-radius: 12px; cursor: pointer;
            transition: all 0.3s; position: relative; opacity: 0;
            animation: fadeInLeft 0.4s ease forwards;
        }
        @keyframes fadeInLeft { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
        .tool-item:hover { background: #f5f7fa; }
        .tool-item:active { transform: scale(0.97); }
        .tool-item.active { background: #e8f0ff; }
        .tool-item.has-children { justify-content: space-between; }
        .tool-item.active::before {
            content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
            width:3px; height:60%; background:#1677FF; border-radius:0 3px 3px 0;
        }
        .tool-main { display:flex; align-items:center; min-width:0; }
        .tool-icon { margin-right:12px; font-size:18px; }
        .tool-name { font-size:14px; color:#555; font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .tool-item.active .tool-name { color:#1677FF; font-weight:600; }
        .tool-chevron { color:#a8b2be; font-size:12px; transition:transform 0.2s; margin-left:8px; }
        .tool-item.expanded .tool-chevron { transform:rotate(90deg); }
        .sub-tool-list {
            display:grid;
            gap:2px;
            margin:0 0 6px 28px;
            overflow:hidden;
        }
        .sub-tool-item {
            display:flex; align-items:center; gap:8px;
            min-height:36px; padding:8px 12px;
            margin-right:4px; border-radius:10px;
            color:#64748b; cursor:pointer; transition:all 0.2s;
            position:relative; opacity:0; animation:fadeInLeft 0.28s ease forwards;
        }
        .sub-tool-item:hover { background:#f5f7fa; color:#1677FF; }
        .sub-tool-item.active { background:#edf4ff; color:#1677FF; font-weight:600; }
        .sub-tool-dot {
            width:5px; height:5px; border-radius:50%;
            background:#b7c3d0; flex-shrink:0;
        }
        .sub-tool-item.active .sub-tool-dot { background:#1677FF; }
        .sub-tool-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; }
        .sidebar-divider { margin:8px 20px; border-top:1px solid #f0f0f0; }
        .sidebar-footer { padding:8px; border-top:1px solid #f0f0f0; }
        .footer-item {
            display:flex; align-items:center; padding:11px 16px;
            border-radius:12px; cursor:pointer; transition:all 0.3s;
        }
        .footer-item:hover { background:#f5f7fa; }
        .footer-item .tool-name { color:#888; }
        .logout-item .tool-name { color:#e08080; }
        .logout-item:hover .tool-name { color:#d05050; }

        .main-content { flex:1; height:100vh; overflow-y:auto; position:relative; }
        .topbar {
            height:56px; display:flex; align-items:center; justify-content:flex-end;
            padding:0 24px; border-bottom:1px solid #f0f0f0; background:#fff;
            position:sticky; top:0; z-index:50;
        }
        .topbar-right { display:flex; align-items:center; gap:16px; }
        .user-info { display:flex; align-items:center; gap:8px; color:#555; font-size:14px; }
        .user-avatar {
            width:32px; height:32px; border-radius:50%;
            background:linear-gradient(135deg,#7ec8e3,#4a9ec4);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:14px; font-weight:600;
        }
        .logout-btn {
            padding:6px 16px; border-radius:8px; border:1px solid #ddd; background:#fff;
            color:#888; font-size:13px; cursor:pointer; transition:all 0.2s;
        }
        .logout-btn:hover { border-color:#e08080; color:#d05050; background:#fff5f5; }
        .logout-btn:active { transform:scale(0.95); }
        .hamburger {
            display:none; width:40px; height:40px; border-radius:10px;
            border:1px solid #eee; background:#fff; color:#555; font-size:20px;
            cursor:pointer; align-items:center; justify-content:center;
            position:absolute; left:16px; top:8px; z-index:200;
        }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.2); z-index:90; }
        .sidebar-overlay.show { display:block; }

        .search-page {
            display:block;
            padding:22px 28px 32px;
            min-height:calc(100vh - 56px);
            background:
                radial-gradient(circle at 50% -12%, rgba(22,119,255,0.13), transparent 34%),
                linear-gradient(180deg,#f4f9ff 0%,#f8fbff 42%,#eef6ff 100%);
            animation:fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        .dashboard-shell { width:100%; max-width:1440px; margin:0 auto; }
        .home-search {
            width:min(680px,100%);
            margin:0 auto 26px;
            position:relative;
        }
        .home-search svg {
            position:absolute; left:24px; top:50%; transform:translateY(-50%);
            width:22px; height:22px; color:#1677FF;
        }
        .home-search input {
            width:100%; height:58px; border:1.5px solid #357dff; border-radius:30px;
            background:rgba(255,255,255,0.86); color:#203044;
            padding:0 28px 0 58px; outline:none; font-size:16px; font-weight:600;
            box-shadow:0 14px 34px rgba(44,113,220,0.12), inset 0 1px 0 rgba(255,255,255,0.95);
            transition:border-color .2s, box-shadow .2s, background .2s;
        }
        .home-search input:focus {
            border-color:#1677FF; background:#fff;
            box-shadow:0 16px 42px rgba(44,113,220,0.18), 0 0 0 4px rgba(22,119,255,0.08);
        }
        .home-search input::placeholder { color:#8b99aa; font-weight:500; }

        .dashboard-cards {
            display:grid;
            grid-template-columns:1.05fr 1.05fr 1.05fr 1.05fr;
            gap:22px;
            margin-bottom:24px;
        }
        .dash-card, .notice-board {
            background:rgba(255,255,255,0.86);
            border:1px solid rgba(220,232,246,0.9);
            border-radius:14px;
            box-shadow:0 18px 42px rgba(58,92,132,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
            backdrop-filter:blur(18px) saturate(1.25);
            -webkit-backdrop-filter:blur(18px) saturate(1.25);
        }
        .dash-card { min-height:270px; padding:20px; }
        .card-title-row {
            display:flex; align-items:center; justify-content:space-between; gap:12px;
            margin-bottom:16px;
        }
        .card-heading {
            display:flex; align-items:center; gap:12px; color:#182b43;
            font-size:18px; font-weight:800;
        }
        .card-heading .heading-icon {
            width:28px; height:28px; border-radius:8px; display:grid; place-items:center;
            color:#fff; background:linear-gradient(135deg,#4d9bff,#1677FF);
            box-shadow:0 8px 18px rgba(22,119,255,0.18);
        }
        .card-link {
            border:0; background:transparent; color:#68788f;
            font-size:13px; font-weight:700; cursor:pointer;
        }
        .card-link:hover { color:#1677FF; }
        .tool-shortcuts { display:grid; gap:10px; }
        .shortcut-row {
            min-height:54px; display:flex; align-items:center; justify-content:space-between; gap:12px;
            padding:12px 14px; border:1px solid #dce8f6; border-radius:8px;
            background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(248,251,255,.76));
            color:#24364d; cursor:pointer; transition:all .2s;
        }
        .shortcut-row:hover { border-color:#b9d5fb; transform:translateY(-1px); box-shadow:0 10px 24px rgba(22,119,255,0.08); }
        .shortcut-name { display:flex; align-items:center; gap:12px; min-width:0; font-weight:800; }
        .shortcut-icon {
            width:32px; height:32px; display:grid; place-items:center; border-radius:8px;
            background:linear-gradient(135deg,#83b7ff,#1677FF); color:#fff; flex-shrink:0;
            box-shadow:0 8px 16px rgba(22,119,255,0.16);
        }
        .shortcut-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .arrow { color:#62738a; font-size:22px; }

        .today-todos { display:grid; gap:10px; }
        .today-todo-row {
            min-height:58px; display:flex; align-items:center; justify-content:space-between; gap:12px;
            padding:12px 14px; border:1px solid #dce8f6; border-radius:8px;
            background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(248,251,255,.82));
            color:#24364d; cursor:pointer; transition:all .2s;
        }
        .today-todo-row:hover { border-color:#b9d5fb; transform:translateY(-1px); box-shadow:0 10px 24px rgba(22,119,255,0.08); }
        .today-todo-row.done { opacity:.68; }
        .today-todo-main { display:flex; align-items:flex-start; gap:12px; min-width:0; }
        .todo-check {
            width:28px; height:28px; border-radius:8px; display:grid; place-items:center; flex-shrink:0;
            background:#eef6ff; color:#1677FF; font-size:16px; font-weight:900;
            box-shadow:inset 0 0 0 1px #d6e7fb;
        }
        .todo-check.done { background:linear-gradient(135deg,#55d692,#17aa6b); color:#fff; box-shadow:none; }
        .todo-copy { min-width:0; }
        .todo-copy strong {
            display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            color:#203044; font-size:14px; font-weight:800;
        }
        .todo-copy.done strong { text-decoration:line-through; color:#718096; }
        .todo-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; color:#6d7f96; font-size:12px; font-weight:700; }
        .todo-pill {
            display:inline-flex; align-items:center; min-height:22px; padding:2px 8px;
            border-radius:999px; background:#eef4fb; color:#62738a;
        }
        .todo-pill.urgent { background:#ffecec; color:#df3b3b; }
        .todo-pill.important { background:#fff2d8; color:#c47700; }
        .todo-pill.done { background:#e6f7ef; color:#0f9a61; }
        .empty-dashboard {
            min-height:58px; display:flex; align-items:center; justify-content:center;
            border:1px dashed #d9e6f5; border-radius:8px; color:#7c8da4;
            background:rgba(250,253,255,0.72); font-size:14px; font-weight:700;
        }

        .remind-list { display:grid; gap:12px; }
        .remind-box {
            min-height:92px; display:flex; align-items:center; justify-content:space-between; gap:14px;
            padding:14px 16px; border:1px solid #dce8f6; border-radius:8px;
            background:rgba(250,253,255,0.9); cursor:pointer;
        }
        .remind-left { display:flex; align-items:center; gap:14px; min-width:0; }
        .remind-icon {
            width:54px; height:54px; border-radius:12px; display:grid; place-items:center; color:#fff;
            box-shadow:0 10px 22px rgba(22,119,255,0.16);
        }
        .remind-icon.green { background:linear-gradient(135deg,#55d692,#17aa6b); }
        .remind-icon.orange { background:linear-gradient(135deg,#ffc260,#f59a12); }
        .remind-icon svg { width:28px; height:28px; stroke:currentColor; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
        .remind-copy p { margin:0 0 6px; color:#203044; font-size:14px; font-weight:800; }
        .remind-copy strong { color:#16a36b; font-size:34px; line-height:1; margin-right:8px; }
        .remind-copy .orange-text { color:#d77900; }
        .remind-copy span { color:#6a7a91; font-size:14px; }

        .recent-list { display:grid; gap:0; border:1px solid #dce8f6; border-radius:8px; overflow:hidden; background:rgba(250,253,255,0.9); }
        .recent-row {
            display:flex; align-items:center; gap:12px; min-height:58px; padding:12px;
            border-bottom:1px solid #e8eef6;
        }
        .recent-row:last-child { border-bottom:0; }
        .recent-row { cursor:pointer; }
        .recent-row:hover { background:#f5f9ff; }
        .recent-icon {
            width:34px; height:34px; border-radius:8px; display:grid; place-items:center; color:#fff;
            background:linear-gradient(135deg,#4e9dff,#1677FF); flex-shrink:0;
        }
        .recent-icon.purple { background:linear-gradient(135deg,#b076ff,#7b55df); }
        .recent-icon.cyan { background:linear-gradient(135deg,#33c7d2,#18a5b4); }
        .recent-main { min-width:0; flex:1; }
        .recent-main strong { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#24364d; font-size:14px; }
        .recent-row time { color:#65758d; font-size:13px; white-space:nowrap; }

        .notice-board { padding:22px; }
        .notice-tabs {
            display:flex; align-items:center; justify-content:space-between; gap:16px;
            border-bottom:1px solid #dce8f6; margin-bottom:4px;
        }
        .notice-tab-group { display:flex; gap:18px; }
        .notice-tab {
            position:relative; border:0; background:transparent; padding:0 10px 14px;
            color:#66758b; font-size:17px; font-weight:800; cursor:pointer;
        }
        .notice-tab.active { color:#1677FF; }
        .notice-tab.active::after {
            content:''; position:absolute; left:0; right:0; bottom:-1px; height:3px; border-radius:3px;
            background:#1677FF;
        }
        .notice-more { color:#66758b; font-size:13px; font-weight:700; cursor:pointer; }
        .notice-more:hover { color:#1677FF; }
        .notice-list { display:grid; }
        .notice-row {
            display:grid; grid-template-columns:72px minmax(220px,1.45fr) minmax(220px,1fr) minmax(160px,.75fr) 104px;
            align-items:center; gap:12px; min-height:56px; border-bottom:1px solid #edf2f8;
        }
        .notice-row:last-child { border-bottom:0; }
        .notice-title { min-width:0; color:#14243a; font-size:15px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .notice-tags { display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0; }
        .status-pill, .data-pill {
            display:inline-flex; align-items:center; min-height:26px; padding:4px 10px; border-radius:6px;
            font-size:13px; font-weight:800; white-space:nowrap;
        }
        .status-pill.green { color:#12955f; background:#e6f8ef; }
        .status-pill.blue { color:#1677FF; background:#eaf3ff; }
        .status-pill.gray { color:#64748b; background:#edf1f6; }
        .status-pill.orange { color:#b56100; background:#fff1d9; }
        .data-pill.region { color:#1677FF; background:#eaf3ff; }
        .data-pill.category { color:#bf6700; background:#fff1dc; }
        .data-pill.edu { color:#12935e; background:#e7f8ef; }
        .notice-date { color:#68788f; font-size:13px; display:flex; gap:22px; justify-content:flex-end; }
        .notice-date strong { white-space:nowrap; }
        .notice-detail {
            justify-self:end; min-height:32px; padding:6px 12px; border-radius:6px;
            border:1px solid #bfd8f6; background:#fff; color:#1677FF; font-weight:800; cursor:pointer;
        }
        .notice-detail:hover { background:#f2f7ff; }
        .empty-dashboard {
            min-height:120px; display:grid; place-items:center; color:#8190a3; font-weight:700;
        }

        .baidu-logo { margin-bottom:30px; height:130px; display:flex; align-items:center; justify-content:center; }
        .baidu-logo img { max-height:100%; width:auto; }
        .baidu-logo .fallback {
            display:none; gap:0; align-items:baseline;
        }
        .baidu-logo .fallback .letter-b { font-size:72px; font-weight:800; color:#2932e1; }
        .baidu-logo .fallback .letter-ai { font-size:72px; font-weight:800; color:#de122b; }
        .baidu-logo .fallback .letter-du { font-size:72px; font-weight:800; color:#2932e1; }
        .baidu-logo .fallback .chinese { font-size:54px; font-weight:800; color:#de122b; margin-left:2px; }

        .search-tabs { display:flex; gap:4px; margin-bottom:16px; }
        .search-tab {
            padding:6px 16px; border-radius:16px; border:none;
            background:#f5f5f5; color:#999; font-size:13px;
            cursor:pointer; transition:all 0.3s;
        }
        .search-tab:hover { background:#eee; }
        .search-tab:active { transform:scale(0.95); }
        .search-tab.active { background:#1677FF; color:#fff; }

        .search-box { width:100%; max-width:640px; margin-bottom:30px; }
        .search-input-wrap {
            display:flex; align-items:center; background:#fff;
            border-radius:12px; border:2px solid #1677FF;
            overflow:hidden; transition:all 0.3s;
            box-shadow:0 2px 12px rgba(22,119,255,0.08);
        }
        .search-input-wrap:focus-within { box-shadow:0 4px 20px rgba(22,119,255,0.15); }
        .search-input-wrap input {
            flex:1; padding:14px 20px; border:none;
            background:transparent; color:#333; font-size:16px; outline:none;
        }
        .search-input-wrap input::placeholder { color:#bbb; }
        .search-btn {
            padding:14px 32px; border:none; background:#1677FF;
            color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s;
        }
        .search-btn:hover { background:#0958D9; }
        .search-btn:active { transform:scale(0.96); }

        .tool-page { position:relative; display:none; height:calc(100vh - 56px); animation:toolFadeIn 0.35s ease; background:#fff; }
        .tool-page.active { display:flex; flex-direction:column; }
        @keyframes toolFadeIn { from{opacity:0;transform:scale(0.98);} to{opacity:1;transform:scale(1);} }
        .tool-toolbar {
            display:none; align-items:center; justify-content:space-between; gap:12px;
            min-height:48px; padding:8px 14px; border-bottom:1px solid #f0f0f0;
            background:rgba(255,255,255,0.95); backdrop-filter:blur(8px);
            flex-shrink:0;
        }
        .tool-toolbar.show { display:flex; }
        .tool-title {
            min-width:0; flex:1; color:#2c3e50; font-size:14px; font-weight:600;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        .tool-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        .toolbar-btn {
            display:inline-flex; align-items:center; justify-content:center; gap:4px;
            min-height:32px; padding:6px 12px; border-radius:8px; border:1px solid #eee;
            background:#fff; color:#667085; font-size:13px;
            cursor:pointer; transition:all 0.2s;
        }
        .toolbar-btn:hover { color:#1677FF; border-color:#1677FF; background:#f8fbff; }
        .toolbar-btn:active { transform:scale(0.96); }
        .tool-frame-wrap { position:relative; flex:1; min-height:0; }
        .tool-page iframe { width:100%; height:100%; border:none; display:block; background:#fff; }
        .iframe-tip {
            position:absolute; right:16px; bottom:16px; max-width:320px;
            padding:10px 14px; border-radius:10px;
            background:rgba(44,62,80,0.84); color:#fff; font-size:12px;
            box-shadow:0 8px 24px rgba(0,0,0,0.16);
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .iframe-tip.show { opacity:1; pointer-events:auto; }

        .toast {
            position:fixed; top:20px; left:50%;
            transform:translateX(-50%) translateY(-100px);
            background:rgba(0,0,0,0.7); color:#fff;
            padding:10px 24px; border-radius:12px; font-size:14px;
            z-index:9999; transition:transform 0.3s;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        @media screen and (max-width:768px) {
            .sidebar { position:fixed; left:0; top:0; transform:translateX(-100%); z-index:100; width:260px; }
            .sidebar.open { transform:translateX(0); }
            .sidebar-overlay.show { display:block; }
            .hamburger { display:flex; }
            .topbar { justify-content:center; }
            .search-page { padding:20px 12px 18px; }
            .home-search { margin-bottom:16px; }
            .home-search input { height:52px; padding-left:52px; font-size:14px; }
            .dashboard-cards { grid-template-columns:1fr; gap:12px; }
            .dash-card { min-height:0; padding:16px; }
            .notice-board { padding:16px; }
            .notice-row {
                grid-template-columns:1fr;
                gap:8px; align-items:start; padding:14px 0;
            }
            .notice-date { justify-content:flex-start; }
            .notice-detail { justify-self:start; }
            .baidu-logo { height:90px; }
            .topbar-right { gap:8px; }
            .user-info span { max-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
            .tool-page { height:calc(100vh - 56px); }
            .tool-toolbar { min-height:52px; padding:8px 10px; }
            .toolbar-btn { padding:7px 10px; font-size:12px; }
            .iframe-tip { left:12px; right:12px; bottom:12px; max-width:none; }
        }
        @media screen and (max-width:1180px) and (min-width:769px) {
            .search-page { padding:20px 18px 28px; }
            .dashboard-cards { grid-template-columns:repeat(2,minmax(0,1fr)); }
            .notice-row { grid-template-columns:72px minmax(240px,1fr) minmax(260px,1fr); padding:12px 0; }
            .notice-date { justify-content:flex-start; }
            .notice-detail { justify-self:start; }
        }
        .sidebar::-webkit-scrollbar { width:4px; }
        .sidebar::-webkit-scrollbar-thumb { background:#ddd; border-radius:4px; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-lockup">
                    <div class="brand-mark">Y</div>
                    <div class="brand-text">
                        <div class="brand-name" data-setting="brandName">言华教育</div>
                        <div class="brand-sub">YANHUA OFFICE</div>
                    </div>
                </div>
            </div>
            <nav class="tool-list" id="toolList"></nav>
            <div id="adminSection" style="display:none;">
                <div class="sidebar-divider"></div>
                <div class="sidebar-footer">
                    <div class="footer-item" id="adminBtn">
                        <span class="tool-icon">⚙️</span>
                        <span class="tool-name">后台管理</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="footer-item logout-item" id="logoutBtn">
                    <span class="tool-icon" style="font-size:16px;">🚪</span>
                    <span class="tool-name">退出登录</span>
                </div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <main class="main-content">
            <div class="topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <div class="topbar-right">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <span id="userName">admin</span>
                    </div>
                    <button class="logout-btn" id="topLogoutBtn">退出</button>
                </div>
            </div>

            <div class="search-page" id="searchPage">
                <div class="dashboard-shell">
                    <div class="home-search">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
                        <input type="text" id="searchInput" placeholder="搜索工具、公告、网页关键词" onkeypress="if(event.key==='Enter')doSearch()">
                    </div>

                    <section class="dashboard-cards">
                        <article class="dash-card">
                            <div class="card-title-row">
                                <div class="card-heading"><span class="heading-icon">✓</span>今日待办</div>
                                <button class="card-link" type="button" onclick="openToolByName('待办系统')">全部待办 ›</button>
                            </div>
                            <div class="today-todos" id="dashboardTodayTodos"></div>
                        </article>

                        <article class="dash-card">
                            <div class="card-title-row">
                                <div class="card-heading"><span class="heading-icon">✦</span>邀约提醒</div>
                                <button class="card-link" type="button" onclick="openToolByName('微信邀约线下系统')">全部邀约 ›</button>
                            </div>
                            <div class="remind-list" id="invitationReminders"></div>
                        </article>

                        <article class="dash-card">
                            <div class="card-title-row">
                                <div class="card-heading"><span class="heading-icon">●</span>招录提醒</div>
                                <button class="card-link" type="button" onclick="openToolByName('通辽招录信息查询')">全部提醒 ›</button>
                            </div>
                            <div class="remind-list" id="recruitmentReminders"></div>
                        </article>

                        <article class="dash-card">
                            <div class="card-title-row">
                                <div class="card-heading"><span class="heading-icon">◷</span>最近打开</div>
                                <button class="card-link" type="button" onclick="clearRecentTools()">全部记录 ›</button>
                            </div>
                            <div class="recent-list" id="recentTools"></div>
                        </article>
                    </section>

                    <section class="notice-board">
                        <div class="notice-tabs">
                            <div class="notice-tab-group">
                                <button class="notice-tab active" type="button">最新公告</button>
                                <button class="notice-tab" type="button" onclick="openToolByName('通辽招录信息查询')">热门公告</button>
                            </div>
                            <button class="card-link notice-more" type="button" onclick="openToolByName('通辽招录信息查询')">查看更多 ›</button>
                        </div>
                        <div class="notice-list" id="latestNotices"></div>
                    </section>
                </div>
            </div>

            <div class="tool-page" id="toolContainer">
                <div class="tool-toolbar" id="toolToolbar">
                    <button class="toolbar-btn" onclick="goHome()">← 返回首页</button>
                    <div class="tool-title" id="toolTitle">工具</div>
                    <div class="tool-actions">
                        <button class="toolbar-btn" onclick="reloadTool()">刷新</button>
                        <button class="toolbar-btn" onclick="openCurrentTool()">新窗口打开</button>
                    </div>
                </div>
                <div class="tool-frame-wrap">
                    <iframe id="toolIframe"></iframe>
                    <div class="iframe-tip" id="iframeTip">如果页面没有显示，可能是目标网站禁止嵌入。可以点右上角“新窗口打开”。</div>
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.YANHUA_API_BASE || (location.protocol === 'file:' ? 'http://localhost:8080' : '');
        const DEFAULT_SETTINGS = { brandName: '言华教育' };
        const LOCAL_TOOL_ENTRY = {
            id: 'local-tongliao-public-institution-jobs',
            name: '通辽市事业单位岗位查询',
            icon: 'building',
            url: 'tools/tongliao-public-institution-jobs/index.html',
            openMode: 'iframe',
            visible: true,
            order: 0,
            children: []
        };
        let currentUser=null, tools=[], recruitmentJobs=[], invitations=[], todos=[], currentTool=null, expandedTools=new Set(), searchEngine='baidu';
        let appSettings = { ...DEFAULT_SETTINGS };
        const engineUrls = { baidu:'https://www.baidu.com/s?wd=', bing:'https://www.bing.com/search?q=', google:'https://www.google.com/search?q=' };
        const placeholders = { baidu:'百度搜索...', bing:'必应搜索...', google:'Google 搜索...' };
        const btnTexts = { baidu:'百度一下', bing:'必应搜索', google:'Google 搜索' };

        window.addEventListener('DOMContentLoaded', ()=>{
            const saved = localStorage.getItem('yanhua_user');
            if(!saved){window.location.href='index.html';return;}
            try{
                currentUser=JSON.parse(saved);
                if(!currentUser||!currentUser.id){window.location.href='index.html';return;}
            }catch(e){window.location.href='index.html';return;}
            document.getElementById('userName').textContent=currentUser.username;
            document.getElementById('userAvatar').textContent=currentUser.username.charAt(0).toUpperCase();
            if(currentUser.role==='admin') document.getElementById('adminSection').style.display='block';
            document.getElementById('adminBtn')?.addEventListener('click',()=>window.location.href='admin.html');
            document.getElementById('logoutBtn')?.addEventListener('click',logout);
            document.getElementById('topLogoutBtn')?.addEventListener('click',logout);
            loadSettings();
            loadTools();
            loadDashboardData();
        });

        async function loadSettings(){
            try{
                const res=await fetch(API_BASE+'/api/settings');
                const result=await res.json();
                if(result.success) appSettings={...DEFAULT_SETTINGS,...result.data};
            }catch(e){
                appSettings={...DEFAULT_SETTINGS};
            }
            applySettings();
        }

        function applySettings(){
            const brandName=String(appSettings.brandName||DEFAULT_SETTINGS.brandName).trim()||DEFAULT_SETTINGS.brandName;
            document.querySelectorAll('[data-setting="brandName"]').forEach(el=>{el.textContent=brandName;});
            document.title=brandName+' · 工具导航';
        }

        async function loadTools(){
            try{
                const res=await fetch(API_BASE+'/api/tools?role='+(currentUser.role||'user'));
                const result=await res.json();
                if(result.success){tools=withLocalToolEntry(result.data||[]);renderTools();renderDashboard();}
            }catch(e){showToast('工具列表加载失败');}
        }

        function withLocalToolEntry(list){
            const next=(Array.isArray(list)?list:[]).map(tool=>({
                ...tool,
                children:Array.isArray(tool.children)?tool.children:[]
            }));
            const exists=next.some(tool=>tool.name===LOCAL_TOOL_ENTRY.name||tool.url===LOCAL_TOOL_ENTRY.url
                ||(tool.children||[]).some(child=>child.name===LOCAL_TOOL_ENTRY.name||child.url===LOCAL_TOOL_ENTRY.url));
            if(exists) return next;
            const insertIndex=next.findIndex(tool=>tool.name&&tool.name.includes('内蒙古公务员岗位查询'));
            const localTool={...LOCAL_TOOL_ENTRY, children:[]};
            if(insertIndex>=0) next.splice(insertIndex+1,0,localTool);
            else next.push(localTool);
            return next;
        }

        async function loadDashboardData(){
            const userQuery='?role='+(currentUser.role||'user')+'&username='+encodeURIComponent(currentUser.username||'');
            try{
                const [jobRes, inviteRes, todoRes]=await Promise.all([
                    fetch(API_BASE+'/api/recruitment'),
                    fetch(API_BASE+'/api/invitations'+userQuery),
                    fetch(API_BASE+'/api/todos'+userQuery)
                ]);
                const jobResult=await jobRes.json();
                const inviteResult=await inviteRes.json();
                const todoResult=await todoRes.json();
                recruitmentJobs=jobResult.success&&Array.isArray(jobResult.data)?jobResult.data:[];
                invitations=inviteResult.success&&Array.isArray(inviteResult.data)?inviteResult.data:[];
                todos=todoResult.success&&Array.isArray(todoResult.data)?todoResult.data:[];
            }catch(e){
                recruitmentJobs=[];
                invitations=[];
                todos=[];
            }
            renderDashboard();
        }

        function escapeHtml(value){
            return String(value ?? '').replace(/[&<>"']/g, s => ({
                '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
            }[s]));
        }

        function getToolKey(tool, child){
            return child ? `${tool.id}:${child.id}` : String(tool.id);
        }

        const TOOL_ICON_MAP={
            search:'🔍',
            graduation:'🎓',
            briefcase:'💼',
            book:'📚',
            star:'⭐',
            chart:'📊',
            link:'🔗',
            notice:'📋',
            invite:'🤝',
            government:'🏛️',
            web:'🌐',
            business:'🧰',
            write:'✍🏻',
            writing:'✍🏻',
            todo:'✍🏻',
            university:'🏫',
            school:'🏫',
            building:'🏢'
        };

        function displayToolIcon(tool, index=0){
            const fallback=['🔍','🎓','💼','📚','⭐','📊'][index%6];
            const icon=tool&&tool.icon;
            if(!icon) return fallback;
            return TOOL_ICON_MAP[icon] || icon || fallback;
        }

        function renderTools(){
            const list=document.getElementById('toolList'); list.innerHTML='';
            tools.forEach((tool,i)=>{
                const children=Array.isArray(tool.children)?tool.children:[];
                const hasChildren=children.length>0;
                const isExpanded=expandedTools.has(tool.id);
                const activeParent=String(currentTool||'').startsWith(String(tool.id)+':') || currentTool===String(tool.id);
                const item=document.createElement('div');
                item.className='tool-item'
                    +(activeParent?' active':'')
                    +(hasChildren?' has-children':'')
                    +(isExpanded?' expanded':'');
                item.style.animationDelay=(i*0.06)+'s';
                item.innerHTML=`<span class="tool-main"><span class="tool-icon">${displayToolIcon(tool,i)}</span><span class="tool-name">${escapeHtml(tool.name)}</span></span>${hasChildren?'<span class="tool-chevron">▶</span>':''}`;
                item.onclick=()=>hasChildren?toggleToolGroup(tool):selectTool(tool);
                list.appendChild(item);

                if(hasChildren&&isExpanded){
                    const subList=document.createElement('div');
                    subList.className='sub-tool-list';
                    children.forEach((child,childIndex)=>{
                        const subItem=document.createElement('div');
                        const key=getToolKey(tool,child);
                        subItem.className='sub-tool-item'+(currentTool===key?' active':'');
                        subItem.style.animationDelay=((i*0.04)+(childIndex*0.03))+'s';
                        subItem.innerHTML=`<span class="sub-tool-dot"></span><span class="sub-tool-name">${escapeHtml(child.name)}</span>`;
                        subItem.onclick=()=>selectTool(tool,child);
                        subList.appendChild(subItem);
                    });
                    list.appendChild(subList);
                }
            });
            renderDashboard();
        }

        function renderDashboard(){
            renderTodayTodos();
            renderRecruitmentReminders();
            renderRecentTools();
            renderInvitationReminders();
            renderLatestNotices();
        }

        function visibleToolEntries(){
            const entries=[];
            tools.forEach(tool=>{
                const children=Array.isArray(tool.children)?tool.children:[];
                if(children.length){
                    children.filter(child=>child.visible!==false).forEach(child=>entries.push({tool, child, name:child.name, key:getToolKey(tool,child)}));
                }else{
                    entries.push({tool, child:null, name:tool.name, key:getToolKey(tool)});
                }
            });
            return entries;
        }

        function iconForTool(entry, index=0){
            const name=typeof entry==='string'?entry:(entry&&entry.name)||'';
            const tool=entry&&typeof entry==='object'?entry.tool||entry:null;
            if(tool&&tool.icon) return displayToolIcon(tool,index);
            if(/待办/.test(name)) return '✍🏻';
            if(/高校专业类别/.test(name)) return '🏫';
            if(/邀约/.test(name)) return '✦';
            if(/招录|招聘/.test(name)) return '⌕';
            if(/成考|学历/.test(name)) return '◆';
            if(/国开|开放大学/.test(name)) return '◼';
            if(/专业/.test(name)) return '★';
            return ['▣','◇','◆','●'][index%4];
        }

        function renderDashboardTools(){
            const box=document.getElementById('dashboardTools');
            if(!box) return;
            const entries=visibleToolEntries().slice(0,3);
            box.innerHTML=entries.length?entries.map((entry,index)=>`
                <div class="shortcut-row" onclick="selectToolByKey('${escapeHtml(entry.key)}')">
                    <span class="shortcut-name"><span class="shortcut-icon">${iconForTool(entry,index)}</span><span class="shortcut-text">${escapeHtml(entry.name)}</span></span>
                    <span class="arrow">›</span>
                </div>
            `).join(''):'<div class="empty-dashboard">暂无可用工具</div>';
        }

        function todoPriorityClass(priority){
            if(priority==='紧急') return 'urgent';
            if(priority==='重要') return 'important';
            return '';
        }

        function renderTodayTodos(){
            const box=document.getElementById('dashboardTodayTodos');
            if(!box) return;
            const today=localTodayString();
            const todayTodos=todos
                .filter(todo=>todo.dueDate===today)
                .sort((a,b)=>{
                    if(Boolean(a.completed)!==Boolean(b.completed)) return a.completed?1:-1;
                    const aTime=a.dueTime||'23:59';
                    const bTime=b.dueTime||'23:59';
                    if(aTime!==bTime) return aTime.localeCompare(bTime);
                    const weight={'紧急':0,'重要':1,'普通':2};
                    return (weight[a.priority]??2)-(weight[b.priority]??2);
                })
                .slice(0,3);
            box.innerHTML=todayTodos.length?todayTodos.map(todo=>`
                <div class="today-todo-row ${todo.completed?'done':''}" onclick="openToolByName('待办系统')">
                    <span class="today-todo-main">
                        <span class="todo-check ${todo.completed?'done':''}">${todo.completed?'✓':'□'}</span>
                        <span class="todo-copy ${todo.completed?'done':''}">
                            <strong>${escapeHtml(todo.title)}</strong>
                            <span class="todo-meta">
                                ${todo.dueTime?`<span class="todo-pill">${escapeHtml(todo.dueTime)}</span>`:''}
                                ${todo.priority?`<span class="todo-pill ${todoPriorityClass(todo.priority)}">${escapeHtml(todo.priority)}</span>`:''}
                                ${todo.completed?'<span class="todo-pill done">已完成</span>':''}
                            </span>
                        </span>
                    </span>
                    <span class="arrow">›</span>
                </div>
            `).join(''):'<div class="empty-dashboard">今天暂无待办</div>';
        }

        function localTodayString(){
            const date=new Date();
            const y=date.getFullYear();
            const m=String(date.getMonth()+1).padStart(2,'0');
            const d=String(date.getDate()).padStart(2,'0');
            return `${y}-${m}-${d}`;
        }

        function dateTimeText(date,time=''){
            return [date,time].filter(Boolean).join(' ');
        }

        function deadlineDate(job){
            return job.deadlineType==='untilFull' ? '' : (job.endDate||'');
        }

        function isRecruiting(job){
            const today=localTodayString();
            if(job.startDate&&job.startDate>today) return false;
            if(job.deadlineType==='untilFull') return true;
            return Boolean(job.endDate&&job.endDate>=today);
        }

        function daysUntil(dateText){
            if(!dateText) return null;
            const today=new Date(localTodayString()+'T00:00:00');
            const target=new Date(dateText+'T00:00:00');
            if(Number.isNaN(target.getTime())) return null;
            return Math.ceil((target-today)/86400000);
        }

        function statusForJob(job){
            const today=localTodayString();
            if(job.startDate&&job.startDate>today) return { text:'未开始', cls:'blue' };
            if(job.deadlineType==='untilFull') return { text:'报名中', cls:'green' };
            if(job.endDate&&job.endDate<today) return { text:'已截止', cls:'gray' };
            return { text:'报名中', cls:'green' };
        }

        function renderRecruitmentReminders(){
            const box=document.getElementById('recruitmentReminders');
            if(!box) return;
            const active=recruitmentJobs.filter(isRecruiting).length;
            const ending=recruitmentJobs.filter(job=>{
                const days=daysUntil(deadlineDate(job));
                return days!==null&&days>=0&&days<=3;
            }).length;
            box.innerHTML=`
                <div class="remind-box" onclick="openToolByName('通辽招录信息查询')">
                    <div class="remind-left">
                        <span class="remind-icon green"><svg viewBox="0 0 24 24"><path d="M7 12l3 3 7-8"/><rect x="5" y="4" width="14" height="16" rx="3"/></svg></span>
                        <div class="remind-copy"><p>报名中</p><strong>${active}</strong><span>个公告</span></div>
                    </div>
                    <span class="arrow">›</span>
                </div>
                <div class="remind-box" onclick="openToolByName('通辽招录信息查询')">
                    <div class="remind-left">
                        <span class="remind-icon orange"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="7"/><path d="M12 9v5l3 2M9 2h6"/></svg></span>
                        <div class="remind-copy"><p>即将截止</p><strong class="orange-text">${ending}</strong><span>个公告</span></div>
                    </div>
                    <span class="arrow">›</span>
                </div>
            `;
        }

        function recentTools(){
            try{
                return JSON.parse(localStorage.getItem('yanhua_recent_tools')||'[]');
            }catch(e){return [];}
        }

        function saveRecentTool(name,key){
            const next=[{name,key,time:Date.now()},...recentTools().filter(item=>item.key!==key)].slice(0,6);
            localStorage.setItem('yanhua_recent_tools',JSON.stringify(next));
            renderRecentTools();
        }

        function timeAgo(time){
            const minutes=Math.max(1,Math.round((Date.now()-Number(time||Date.now()))/60000));
            if(minutes<60) return minutes+'分钟前';
            const hours=Math.round(minutes/60);
            return hours+'小时前';
        }

        function renderRecentTools(){
            const box=document.getElementById('recentTools');
            if(!box) return;
            let recent=recentTools().filter(item=>visibleToolEntries().some(entry=>entry.key===item.key)).slice(0,3);
            if(!recent.length){
                recent=visibleToolEntries().slice(0,3).map((entry,index)=>({name:entry.name,key:entry.key,time:Date.now()-(index+1)*3600000}));
            }
            box.innerHTML=recent.length?recent.map((item,index)=>`
                <div class="recent-row" onclick="selectToolByKey('${escapeHtml(item.key)}')">
                    <span class="recent-icon ${index===1?'purple':index===2?'cyan':''}">${iconForTool(item.name,index)}</span>
                    <span class="recent-main"><strong>${escapeHtml(item.name)}</strong></span>
                    <time>${timeAgo(item.time)}</time>
                </div>
            `).join(''):'<div class="empty-dashboard">暂无打开记录</div>';
        }

        function renderInvitationReminders(){
            const box=document.getElementById('invitationReminders');
            if(!box) return;
            const today=localTodayString();
            const todayInvites=invitations.filter(item=>item.appointmentDate===today);
            const followInvites=invitations.filter(item=>item.visitStatus==='待跟进'||item.dealStatus==='待跟进'||item.nextFollowDate);
            box.innerHTML=`
                <div class="remind-box" onclick="openToolByName('微信邀约线下系统')">
                    <div class="remind-left">
                        <span class="remind-icon green"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"/><path d="M8 3v4M16 3v4M8 11h8M8 15h5"/></svg></span>
                        <div class="remind-copy"><p>今日预约</p><strong>${todayInvites.length}</strong><span>个客户</span></div>
                    </div>
                    <span class="arrow">›</span>
                </div>
                <div class="remind-box" onclick="openToolByName('微信邀约线下系统')">
                    <div class="remind-left">
                        <span class="remind-icon orange"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="8"/><path d="M8 2h8"/></svg></span>
                        <div class="remind-copy"><p>待跟进</p><strong class="orange-text">${followInvites.length}</strong><span>个客户</span></div>
                    </div>
                    <span class="arrow">›</span>
                </div>
            `;
        }

        function renderLatestNotices(){
            const box=document.getElementById('latestNotices');
            if(!box) return;
            const jobs=recruitmentJobs.slice(0,5);
            box.innerHTML=jobs.length?jobs.map(job=>{
                const status=statusForJob(job);
                const region=(Array.isArray(job.regions)&&job.regions.length?job.regions.join('、'):job.region||'全部地区');
                const publish=dateTimeText(job.publishDate,job.publishTime);
                return `
                    <div class="notice-row">
                        <span class="status-pill ${status.cls}">${escapeHtml(status.text)}</span>
                        <strong class="notice-title">${escapeHtml(job.title)}</strong>
                        <span class="notice-tags">
                            <span class="data-pill region">${escapeHtml(region)}</span>
                            ${job.category?`<span class="data-pill category">${escapeHtml(job.category)}</span>`:''}
                            ${job.education?`<span class="data-pill edu">${escapeHtml(job.education)}</span>`:''}
                        </span>
                        <span class="notice-date"><span>发布时间</span><strong>${escapeHtml(publish||'-')}</strong></span>
                        <button class="notice-detail" type="button" onclick="openJobLink(${Number(job.id)})">查看详情 ›</button>
                    </div>
                `;
            }).join(''):'<div class="empty-dashboard">暂无招录公告</div>';
        }

        function toggleToolGroup(tool){
            if(expandedTools.has(tool.id)) expandedTools.delete(tool.id);
            else expandedTools.add(tool.id);
            renderTools();
        }

        function normalizeToolUrl(url){
            if(!url) return '';
            if(url.startsWith('http://')||url.startsWith('https://')) return url;
            let toolUrl=url;
            if(toolUrl.startsWith('/')) toolUrl=toolUrl.substring(1);
            if(!toolUrl.endsWith('/')&&!toolUrl.match(/\.\w+($|\?)/)) toolUrl+='/index.html';
            else if(toolUrl.endsWith('/')) toolUrl+='index.html';
            return toolUrl;
        }

        function selectTool(tool, child=null){
            const target=child||tool;
            const toolUrl=normalizeToolUrl(target.url);
            const toolKey=getToolKey(tool,child);
            if(target.openMode==='external'){
                const opened=window.open(toolUrl,'_blank');
                showToast(opened ? '已在新窗口打开' : '浏览器拦截了新窗口，请允许弹窗后重试');
                saveRecentTool(target.name,toolKey);
                if(window.innerWidth<=768) toggleSidebar();
                return;
            }

            currentTool=toolKey;
            if(child) expandedTools.add(tool.id);
            saveRecentTool(target.name,toolKey);
            renderTools();
            document.getElementById('searchPage').style.display='none';
            const container=document.getElementById('toolContainer');
            container.className='tool-page active';
            document.getElementById('toolToolbar').classList.add('show');
            document.getElementById('toolTitle').textContent=child ? tool.name + ' / ' + child.name : tool.name;
            container.style.animation='none'; container.offsetHeight; container.style.animation='';
            document.getElementById('toolIframe').src=toolUrl;
            showIframeTip();
            if(window.innerWidth<=768) toggleSidebar();
        }

        function selectToolByKey(key){
            for(const tool of tools){
                if(String(tool.id)===String(key)) return selectTool(tool);
                const child=(tool.children||[]).find(item=>getToolKey(tool,item)===String(key));
                if(child) return selectTool(tool,child);
            }
            showToast('没有找到对应工具');
        }

        function openToolByName(name){
            const entry=visibleToolEntries().find(item=>item.name.includes(name)||name.includes(item.name));
            if(entry) selectTool(entry.tool,entry.child);
            else showToast('没有找到对应工具');
        }

        function focusSidebarTools(){
            if(window.innerWidth<=768) toggleSidebar();
            document.getElementById('toolList')?.scrollIntoView({behavior:'smooth',block:'start'});
        }

        function clearRecentTools(){
            localStorage.removeItem('yanhua_recent_tools');
            renderRecentTools();
            showToast('最近打开已重置');
        }

        function openJobLink(id){
            const job=recruitmentJobs.find(item=>Number(item.id)===Number(id));
            if(job?.link) window.open(job.link,'_blank');
            else openToolByName('通辽招录信息查询');
        }

        function goHome(){
            currentTool=null; renderTools();
            document.getElementById('searchPage').style.display='block';
            document.getElementById('toolContainer').className='tool-page';
            document.getElementById('toolToolbar').classList.remove('show');
            document.getElementById('toolIframe').src='';
            document.getElementById('iframeTip').classList.remove('show');
            renderDashboard();
        }

        function getCurrentTool(){
            for(const tool of tools){
                if(currentTool===String(tool.id)) return tool;
                const child=(tool.children||[]).find(item=>currentTool===getToolKey(tool,item));
                if(child) return child;
            }
            return null;
        }

        function openCurrentTool(){
            const tool=getCurrentTool();
            if(!tool) return;
            window.open(normalizeToolUrl(tool.url),'_blank');
        }

        function reloadTool(){
            const iframe=document.getElementById('toolIframe');
            if(iframe.src) iframe.src=iframe.src;
        }

        function showIframeTip(){
            const tip=document.getElementById('iframeTip');
            tip.classList.remove('show');
            setTimeout(()=>tip.classList.add('show'),1800);
            setTimeout(()=>tip.classList.remove('show'),7000);
        }

        function toggleSidebar(){
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function switchEngine(el){
            document.querySelectorAll('.search-tab').forEach(t=>t.classList.remove('active'));
            el.classList.add('active');
            searchEngine=el.dataset.engine;
            document.getElementById('searchInput').placeholder=placeholders[searchEngine];
            document.querySelector('.search-btn').textContent=btnTexts[searchEngine];
        }

        function doSearch(){
            const kw=document.getElementById('searchInput').value.trim();
            if(!kw) return;
            const toolEntry=visibleToolEntries().find(entry=>entry.name.includes(kw)||kw.includes(entry.name));
            if(toolEntry){
                selectTool(toolEntry.tool,toolEntry.child);
                return;
            }
            const job=recruitmentJobs.find(item=>[item.title,item.region,item.category,item.source,item.education].join(' ').includes(kw));
            if(job){
                openJobLink(job.id);
                return;
            }
            showToast('没有匹配到工具或公告');
        }

        async function logout(){
            try{await fetch(API_BASE+'/api/auth/logout',{method:'POST'});}catch(e){}
            localStorage.removeItem('yanhua_user');
            window.location.href='index.html';
        }

        function showToast(msg){
            const toast=document.getElementById('toast');
            toast.textContent=msg; toast.className='toast show';
            setTimeout(()=>{toast.className='toast';},2500);
        }
    </script>
</body>
</html>
