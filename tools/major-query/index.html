<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业类别查询系统</title>
    <style>
        :root {
            --primary-color: #1677FF;
            --primary-hover: #0958D9;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --border-color: #dcdfe6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            padding: 24px 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .header p {
            color: #999;
            font-size: 13px;
        }

        .filter-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 6px;
            font-size: 13px;
            color: #606266;
            font-weight: 500;
        }

        .form-group label.required::before {
            content: '*';
            color: #f56c6c;
            margin-right: 4px;
        }

        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.1);
        }

        .form-group input::placeholder { color: #c0c4cc; }

        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 10px 32px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-clear {
            background: #fff;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-clear:hover { background: #f0f5ff; }

        .btn-query {
            background: var(--primary-color);
            color: #fff;
        }

        .btn-query:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .disclaimer {
            font-size: 12px;
            color: #999;
            line-height: 1.8;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: var(--primary-color);
            font-size: 14px;
            display: none;
        }

        .loading.show { display: block; }

        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid var(--primary-color);
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-section { margin-top: 32px; display: none; }
        .result-section.show { display: block; }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-left: 10px;
            border-left: 3px solid var(--primary-color);
        }

        .result-count { font-size: 13px; color: #999; font-weight: normal; margin-left: 8px; }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        thead { background: var(--primary-color); }

        th {
            color: #fff;
            padding: 12px 14px;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
        }

        td {
            padding: 12px 14px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            color: #606266;
            font-size: 13px;
        }

        tbody tr:hover { background: #f5f9ff; }
        tbody tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-本科 { background: #e6f0ff; color: #1677FF; }
        .badge-专科 { background: #fef3e2; color: #f5a623; }
        .badge-研究生 { background: #f0f4ff; color: #5b6abf; }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #c0c4cc;
        }

        .no-data svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.4; }
        .no-data p { font-size: 14px; }

        @media (max-width: 640px) {
            .container { padding: 20px; }
            .filter-form { grid-template-columns: 1fr; gap: 14px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
            th, td { padding: 10px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 专业类别查询系统</h1>
            <p>输入专业名称，查询对应的专业小类和专业大类</p>
        </div>

        <div class="filter-form">
            <div class="form-group">
                <label>学历层次</label>
                <select id="degree">
                    <option value="全部">全部</option>
                    <option value="本科">本科</option>
                    <option value="专科">专科</option>
                    <option value="研究生">研究生</option>
                </select>
            </div>
            <div class="form-group">
                <label class="required">专业名称</label>
                <input type="text" id="majorInput" placeholder="请输入专业名称，例如：会计学">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-clear" onclick="clearForm()">清空</button>
            <button class="btn btn-query" id="queryBtn" onclick="search()">查询</button>
        </div>

        <div class="loading" id="loading"><span class="spinner"></span>查询中...</div>

        <div class="result-section" id="resultSection">
            <div class="result-title">查询结果 <span class="result-count" id="resultCount"></span></div>
            <table>
                <thead>
                    <tr>
                        <th>专业名称</th>
                        <th>专业小类</th>
                        <th>专业大类</th>
                        <th>学历层次</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>

        <div class="disclaimer">
            说明：本工具数据来源为教育部《普通高等学校本科专业目录》及高职高专专业目录，仅供参考。如有疑问，请联系相关部门核实。
        </div>
    </div>

    <script>
        let index = [];
        let loaded = false;

        const majorInput = document.getElementById('majorInput');
        const degreeSelect = document.getElementById('degree');
        const queryBtn = document.getElementById('queryBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultBody = document.getElementById('resultBody');
        const resultCount = document.getElementById('resultCount');

        // 加载数据
        async function loadData() {
            if (loaded) return;
            try {
                const res = await fetch('majors.json');
                const rawData = await res.json();
                index = [];
                for (const [degree, categories] of Object.entries(rawData)) {
                    for (const [majorClass, subClasses] of Object.entries(categories)) {
                        for (const [subClass, majors] of Object.entries(subClasses)) {
                            for (const major of majors) {
                                index.push({ 专业名称: major, 专业小类: subClass, 专业大类: majorClass, 学历: degree });
                            }
                        }
                    }
                }
                loaded = true;
                console.log('专业数据加载完成:', index.length, '条');
            } catch (e) {
                console.error('数据加载失败:', e);
            }
        }

        majorInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });

        async function search() {
            const major = majorInput.value.trim();
            const degree = degreeSelect.value;

            if (!major) {
                majorInput.focus();
                majorInput.style.borderColor = '#f56c6c';
                setTimeout(() => { majorInput.style.borderColor = ''; }, 2000);
                return;
            }

            if (!loaded) {
                showToast('数据加载中，请稍候...');
                await loadData();
            }

            loading.classList.add('show');
            resultSection.classList.remove('show');
            queryBtn.disabled = true;

            // 模拟短暂延迟提升体验
            await new Promise(r => setTimeout(r, 200));

            let results = index.filter(item => item.专业名称.includes(major));
            if (degree && degree !== '全部') {
                results = results.filter(item => item.学历 === degree);
            }

            resultBody.innerHTML = '';

            if (results.length > 0) {
                resultCount.textContent = `(共 ${results.length} 条)`;
                results.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${highlightMatch(item.专业名称, major)}</td>
                        <td>${item.专业小类}</td>
                        <td>${item.专业大类}</td>
                        <td><span class="badge badge-${item.学历}">${item.学历}</span></td>
                    `;
                    resultBody.appendChild(row);
                });
            } else {
                resultBody.innerHTML = `<tr><td colspan="4"><div class="no-data"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到与「${major}」相关的专业</p><p style="font-size:12px;margin-top:6px;">请检查输入或尝试其他关键词</p></div></td></tr>`;
            }

            resultSection.classList.add('show');
            loading.classList.remove('show');
            queryBtn.disabled = false;
        }

        function highlightMatch(text, keyword) {
            if (!keyword) return text;
            const i = text.indexOf(keyword);
            if (i === -1) return text;
            return text.slice(0, i) + '<span style="color:#1677FF;font-weight:600;">' + keyword + '</span>' + text.slice(i + keyword.length);
        }

        function clearForm() {
            majorInput.value = '';
            degreeSelect.value = '全部';
            resultSection.classList.remove('show');
            majorInput.focus();
        }

        function showToast(msg) {
            let toast = document.getElementById('_toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = '_toast';
                toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:9999;';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        window.addEventListener('load', () => {
            loadData();
            majorInput.focus();
        });
    </script>
</body>
</html>
