<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招录公告管理</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toast" id="toast"></div>
  <main class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <h1>招录公告管理</h1>
        <p>维护招录公告数据，员工端会实时读取这里保存的内容</p>
      </div>
      <div class="top-actions">
        <a class="btn secondary" href="index.html">返回查询</a>
        <button class="btn secondary" type="button" onclick="loadJobs()">刷新</button>
      </div>
    </header>

    <div class="admin-layout">
      <section class="panel form-panel">
        <div class="section-title">
          <h2 id="formTitle">新增公告</h2>
        </div>
        <form id="jobForm">
          <input type="hidden" id="jobId">
          <div class="form-grid">
            <div class="field full">
              <label for="title">公告标题 *</label>
              <input id="title" type="text" required placeholder="例如：通辽市某单位招聘公告">
            </div>
            <div class="field full">
              <div class="field-label-row">
                <label>地区 *</label>
                <div class="mini-actions">
                  <button type="button" onclick="selectAllRegions()">全选</button>
                  <button type="button" onclick="clearRegions()">清空</button>
                </div>
              </div>
              <div class="choice-grid" id="regionPicker"></div>
            </div>
            <div class="field">
              <label for="category">类别 *</label>
              <select id="category" required></select>
            </div>
            <div class="field">
              <label for="education">学历要求</label>
              <select id="education">
                <option value="">不限</option>
                <option value="专科及以上">专科及以上</option>
                <option value="本科及以上">本科及以上</option>
                <option value="硕士及以上">硕士及以上</option>
                <option value="博士">博士</option>
              </select>
            </div>
            <div class="field">
              <label for="age">年龄要求</label>
              <select id="age"></select>
              <div class="mini-actions age-actions">
                <button type="button" onclick="addAgeOption()">添加</button>
                <button type="button" onclick="editAgeOption()">修改</button>
                <button type="button" onclick="deleteAgeOption()">删除</button>
              </div>
            </div>
            <div class="field">
              <label for="professionalLimit">专业限制</label>
              <select id="professionalLimit"></select>
            </div>
            <div class="field">
              <label for="examType">考试类型</label>
              <select id="examType"></select>
            </div>
            <div class="field">
              <label for="publishDate">发布日期 *</label>
              <input id="publishDate" type="date" required>
            </div>
            <div class="field full">
              <label for="startDate">报名开始 *</label>
              <div class="date-time-line">
                <input id="startDate" type="date" required>
                <input id="startTime" type="time" aria-label="报名开始时间">
              </div>
            </div>
            <div class="field full">
              <label for="endDate">报名截止 *</label>
              <div class="deadline-line">
                <div class="date-time-line">
                  <input id="endDate" type="date">
                  <input id="endTime" type="time" aria-label="报名截止时间">
                </div>
                <label class="check-line"><input id="untilFull" type="checkbox"><span>报满为止</span></label>
              </div>
            </div>
            <div class="field full">
              <label for="link">原文链接 *</label>
              <input id="link" type="url" required placeholder="https://...">
            </div>
            <div class="field">
              <label for="sourceSelect">来源</label>
              <select id="sourceSelect"></select>
              <input class="source-custom" id="source" type="text" placeholder="请输入来源名称">
            </div>
            <div class="field">
              <label for="note">备注</label>
              <input id="note" type="text" placeholder="内部补充说明">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn" type="submit">保存公告</button>
            <button class="btn secondary" type="button" onclick="resetForm()">取消编辑</button>
          </div>
        </form>
      </section>

      <section class="panel table-panel">
        <div class="section-title">
          <h2>数据管理</h2>
        </div>
        <div class="table-tools">
          <div class="field" style="min-width:min(320px,100%);">
            <label for="adminKeyword">搜索公告</label>
            <input id="adminKeyword" type="search" placeholder="标题、地区、类别、专业、考试、来源">
          </div>
          <div class="top-actions">
            <button class="btn success" type="button" onclick="exportJson()">导出 JSON</button>
            <label class="btn secondary" for="importFile">导入 JSON</label>
            <input id="importFile" type="file" accept="application/json,.json" hidden>
          </div>
        </div>
        <div class="admin-list" id="adminList">
          <div class="loading-state">正在加载公告...</div>
        </div>
        <div class="pagination" id="adminPagination"></div>
      </section>
    </div>
  </main>

  <script src="../../config.js"></script>
  <script src="shared.js"></script>
  <script src="admin.js"></script>
</body>
</html>
